name: Bench

# Anchor-normalized benchmark ratchet. `check` runs on PRs: it compares each
# benchmark's ratio-to-anchor against the committed baseline and fails on a
# >budget regression. The anchor (a frozen pure-CPU loop) divides out the
# runner's raw speed, so the gate is stable across noisy/varying CI machines.
#
# `update` (manual dispatch) re-measures and writes docs/perf/baseline.json, then
# uploads it as an artifact. To move the bar, download that artifact and commit
# baseline.json through a normal PR — the baseline is reviewed source, not a bot
# push to a protected branch.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: 'check (gate against baseline) or update (re-measure baseline → artifact)'
        type: choice
        options: [check, update]
        default: check

permissions:
  contents: read

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: bench-ratchet
        shell: bash
        run: |
          set -o pipefail
          mode="${{ github.event.inputs.mode || 'check' }}"
          go run ./cmd/bench-ratchet \
            -benchtime 1s -count 1 -timeout 15m \
            -budget 0.15 \
            -format markdown \
            "$mode" | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload re-measured baseline
        if: ${{ github.event.inputs.mode == 'update' }}
        uses: actions/upload-artifact@v4
        with:
          name: baseline
          path: docs/perf/baseline.json

      - name: Upload raw capture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-capture
          path: docs/perf/.runs/*.jsonl
          if-no-files-found: ignore
